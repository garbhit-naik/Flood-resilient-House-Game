  left.innerHTML=`
    <div class="end-title">📖 ${G.teamName} — Decision Journal</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="color:rgba(243,237,213,0.4)">Team:</span>
      ${G.members.map(m=>`<span style="background:rgba(232,168,56,0.1);border:1px solid rgba(232,168,56,0.2);border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;color:var(--amber)">${m}</span>`).join('')}
      <span style="color:rgba(243,237,213,0.4);margin-left:6px">${zone.emoji} ${zone.name} · Zone ${p.zone}</span>
    </div>`;

  // Outcome summary bar
  const outcomeBar = document.createElement('div');
  outcomeBar.style.cssText = 'display:flex;gap:6px;margin-bottom:16px';
  p.roundLog.forEach((log,i)=>{
    const lvl = LEVELS[log.round-1];
    const bar = document.createElement('div');
    bar.style.cssText = `flex:1;border-radius:10px;padding:10px 8px;text-align:center;background:${DMG_COLORS[log.damage.overall]}12;border:1.5px solid ${DMG_COLORS[log.damage.overall]}44`;
    bar.innerHTML=`<div style="font-size:18px">${log.damage.overall===0?'🏠':log.damage.overall===1?'🔧':'☠️'}</div>
      <div style="font-size:10px;font-weight:800;color:${DMG_COLORS[log.damage.overall]};margin-top:3px">${['Safe','Repairs','Collapsed'][log.damage.overall]}</div>
      <div style="font-size:9px;color:var(--muted);margin-top:2px">${lvl.emoji} Round ${log.round}</div>`;
    outcomeBar.appendChild(bar);
  });
  // Pad empty rounds
  for(let r=p.roundLog.length;r<3;r++){
    const bar=document.createElement('div');bar.style.cssText='flex:1;border-radius:10px;padding:10px 8px;text-align:center;background:var(--card);border:1.5px solid var(--border)';bar.innerHTML='<div style="font-size:18px;opacity:0.2">—</div><div style="font-size:9px;color:var(--muted)">Not played</div>';outcomeBar.appendChild(bar);
  }
  left.appendChild(outcomeBar);

  // Round-by-round decision journal
  [1,2,3].forEach(rnd=>{
    const log = p.roundLog.find(l=>l.round===rnd);
    const lvl = LEVELS[rnd-1];
    const rb = document.createElement('div'); rb.className='round-block';
    if(!log){
      rb.innerHTML=`<div class="rb-header"><div class="rb-num" style="background:${lvl.color}">${rnd}</div><div style="font-size:13px;font-weight:700;color:var(--muted)">${lvl.emoji} ${lvl.name} — not reached</div></div>`;
      left.appendChild(rb); return;
    }
    const mats = log.fMat ? `${log.fMat.emoji} ${log.fMat.name} + ${log.wMat.emoji} ${log.wMat.name} + ${log.rMat.emoji} ${log.rMat.name}` : '(no house built)';
    const aceNames = log.playedAces.map(id=>{ const a=ACE_POOL.find(x=>x.id===id); return a?a.emoji+' '+a.name:'?'; });
    // Narrate what happened
    const dmg = log.damage;
    let story = '';
    if (!log.fMat) {
      story = 'The team had no house to enter the flood with — they had not been able to build in time.';
    } else {
      const fLine = ['The foundation held solid.','The foundation cracked but stood.','The foundation gave way completely.'][dmg.fDmg];
      const wLine = dmg.fDmg===2 ? 'The walls came down with the foundation.' :
                    ['The walls were unharmed.','The walls took visible damage.','The walls collapsed.'][dmg.wDmg];
      const rLine = rnd===3 ? (['The roof was unscathed.','The roof was damaged.','The roof was destroyed.'][dmg.rDmg]) : '';
      story = [fLine, wLine, rLine].filter(Boolean).join(' ');
    }
    rb.innerHTML=`
      <div class="rb-header">
        <div class="rb-num" style="background:${lvl.color}">${rnd}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:800;color:var(--text)">${lvl.emoji} ${lvl.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:1px">${mats}</div>
        </div>
        <span class="dpill dpill-${dmg.overall}" style="align-self:flex-start">${['Safe','Repairs','Collapse'][dmg.overall]}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0;font-size:10px">
        <div style="background:rgba(255,255,255,0.03);border-radius:7px;padding:6px 8px">
          <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">What the team chose</div>
          <div style="color:var(--text)">${mats}</div>
          ${log.coinsSpent!==undefined?`<div style="color:var(--amber);margin-top:3px;font-size:9px">🪙 ${log.coinsSpent} coins spent</div>`:''}
          ${aceNames.length>0?`<div style="color:#FFD166;margin-top:3px;font-size:9px">🃏 ${aceNames.join(', ')}</div>`:''}
        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:7px;padding:6px 8px">
          <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">What happened</div>
          <div style="color:rgba(243,237,213,0.75);line-height:1.5">${story}</div>
          <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
            ${[['F',dmg.fDmg],['W',dmg.wDmg],rnd===3?['R',dmg.rDmg]:null].filter(Boolean).map(([l,d])=>`<span class="dpill dpill-${d}" style="font-size:8px">${l}: ${['OK','🔧','☠️'][d]}</span>`).join('')}
          </div>
        </div>
      </div>
      ${dmg.notes&&dmg.notes.length?`<div style="font-size:9px;color:rgba(243,237,213,0.3);padding:0 2px">${dmg.notes.map(n=>'› '+n).join('  ')}</div>`:''}`;
    left.appendChild(rb);
  });

  // ── Team reflection: decision-making deep dive ─────────────────
  const refBlock = document.createElement('div');
  refBlock.style.cssText = 'background:rgba(43,125,191,0.07);border:1px solid rgba(43,125,191,0.2);border-radius:14px;padding:16px;margin-top:16px';
  const outcome = safeCt===3?'survived all three floods':safeCt===2?'survived two out of three floods':safeCt===1?'survived only one flood':'lost their home in every flood';
  refBlock.innerHTML=`
    <div style="font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">🪞 How Your Team Made Decisions</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Your household <strong style="color:var(--text)">${outcome}</strong>. Now look back at <em>how</em> you decided, not just <em>what</em> you decided.</div>

    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;border-left:3px solid var(--river)">
        <div style="font-size:10px;font-weight:800;color:#90CAF9;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">🧠 Individual vs Group Thinking</div>
        <div style="font-size:12px;color:rgba(163,210,255,0.85);line-height:1.7">Did each team member have a different instinct about which materials to pick? Who changed their mind during discussion — and what made them change? Did talking together lead to a <em>better</em> decision, or did the group default to one person's opinion?</div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;border-left:3px solid var(--amber)">
        <div style="font-size:10px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">💰 Money and Risk Under Pressure</div>
        <div style="font-size:12px;color:rgba(243,230,180,0.8);line-height:1.7">When the dice gave you a small budget, did your team immediately reach for cheap materials — or did you slow down and think about the flood risk? In real life, do you think people under financial pressure make <em>riskier</em> choices or <em>safer</em> ones? What does this simulation say about that?</div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;border-left:3px solid var(--leaf)">
        <div style="font-size:10px;font-weight:800;color:var(--leaf);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">🎲 Luck, Control, and Blame</div>
        <div style="font-size:12px;color:rgba(180,230,170,0.8);line-height:1.7">How much of your outcome felt within your control? When the damage was bad, did your team feel it was "unlucky" or "the wrong choice"? In real flood events, how do communities assign blame — and is it fair?</div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;border-left:3px solid var(--earth)">
        <div style="font-size:10px;font-weight:800;color:var(--earth);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">🔁 Does This Reflect Real Life?</div>
        <div style="font-size:12px;color:rgba(230,190,150,0.8);line-height:1.7">Think of a real decision your team has faced under time pressure or limited resources. Did you discuss it the same way? What would you do differently — in the game, or in real life — if you had one more round?</div>
      </div>
    </div>`;
  left.appendChild(refBlock);
  div.appendChild(left);

  // ── RIGHT: Key learnings + final insight ──────────────────────
  const right = document.createElement('div'); right.className='end-right';
  right.innerHTML=`
    <div style="font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">🏆 Final Score</div>
    <div style="font-size:28px;text-align:center;margin-bottom:6px">${safeCt===3?'🏠🏠🏠':safeCt===2?'🏠🏠☁️':safeCt===1?'🏠💧💧':'💧💧💧'}</div>
    <div style="text-align:center;font-size:13px;color:${DMG_COLORS[safeCt===3?0:safeCt>=1?1:2]};font-weight:700;margin-bottom:4px">${safeCt}/3 Seasons Survived</div>
    <div style="text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px">${zone.emoji} ${zone.name}</div>

    <div style="height:1px;background:var(--border);margin:10px 0"></div>
    <div style="font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px">🌱 What the Research Shows</div>
    ${[
      ['Zone placement','Often beyond individual control — it is the single biggest predictor of flood damage, larger than material quality.'],
      ['Mud is rational','In many contexts, well-compacted earthen construction outperforms cheap concrete. Skilled knowledge matters as much as material.'],
      ['Stacking floors','One of the oldest flood-adaptation strategies in South Asia — lifting the living space above the flood line.'],
      ['Randomness is real','Soil variability, storm path, and drainage timing make real floods genuinely unpredictable — the dice are not wrong.'],
      ['Ace Cards & equity','Real-world interventions (sandbags, drainage, waterproofing) are unevenly accessible. Wealthier households use them more.'],
      ['Collapse & return','After losing a home, most families rebuild in the same place. Attachment, land rights, and poverty make moving almost impossible.'],
    ].map(([t,d])=>`<div class="learn-item"><span style="color:var(--amber);flex-shrink:0">✦</span><div><strong style="color:var(--text);font-size:10px">${t}:</strong> <span style="font-size:10px">${d}</span></div></div>`).join('')}

    <div style="height:1px;background:var(--border);margin:10px 0"></div>
    <button class="home-btn" onclick="goHome()">🏡 Play Again</button>`;
  div.appendChild(right);
  return div;
}

// ═══════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════

function addElder(container, text) {
  if(!text) return;
  const d=document.createElement('div');d.className='elder-box';
  d.innerHTML=`<div class="elder-avatar">🧓</div><div><div class="elder-name">Village Elder</div><div class="elder-text">"${text}"</div></div>`;
  container.appendChild(d);
}

function addDiscuss(container, text) {
  if(!text) return;
  const d=document.createElement('div');d.className='discuss-box';
  d.innerHTML=`<div class="discuss-icon">💬 Discuss</div><div class="discuss-q">${text}</div>`;
  container.appendChild(d);
}

function goHome(){ if(rafRef)cancelAnimationFrame(rafRef); tsRef=null; screen='setup'; setupTeamName=''; setupMembers=['','']; render(); }
window.goHome=goHome;

// ═══════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>

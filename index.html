```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flood Resilience Builder</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:system-ui;
background:#0b1020;
color:white;
}

#ui{
position:absolute;
right:0;
top:0;
width:250px;
height:100%;
background:#0e162e;
border-left:1px solid #22345a;
padding:12px;
}

h3{
margin:10px 0 6px;
font-size:14px;
color:#8ea7ff;
}

.row{
display:flex;
flex-wrap:wrap;
}

.mat{
width:70px;
height:70px;
background:#182347;
border:1px solid #2d4170;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
margin:6px;
cursor:grab;
font-size:12px;
}

.mat:hover{
border-color:#7ab3ff;
}

#coins{
font-size:18px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="ui">

<div id="coins">Coins: 10</div>

<h3>FOUNDATION</h3>
<div class="row">
<div class="mat" draggable="true" data-cat="foundation" data-id="mud">Mud</div>
<div class="mat" draggable="true" data-cat="foundation" data-id="stone">Stone</div>
<div class="mat" draggable="true" data-cat="foundation" data-id="concrete">Concrete</div>
</div>

<h3>WALLS</h3>
<div class="row">
<div class="mat" draggable="true" data-cat="wall" data-id="mud">Mud</div>
<div class="mat" draggable="true" data-cat="wall" data-id="brick">Brick</div>
<div class="mat" draggable="true" data-cat="wall" data-id="concrete">Concrete</div>
</div>

<h3>ROOF</h3>
<div class="row">
<div class="mat" draggable="true" data-cat="roof" data-id="thatch">Thatch</div>
<div class="mat" draggable="true" data-cat="roof" data-id="metal">Metal</div>
<div class="mat" draggable="true" data-cat="roof" data-id="concrete">Concrete</div>
</div>

</div>

<script>

/* ------------------------------------------------
SCENE SETUP
------------------------------------------------ */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(10,8,10)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.shadowMap.enabled=true

document.body.appendChild(renderer.domElement)

/* ------------------------------------------------
LIGHTING
------------------------------------------------ */

const sun = new THREE.DirectionalLight(0xffffff,1.2)
sun.position.set(5,10,5)
sun.castShadow=true
scene.add(sun)

scene.add(new THREE.AmbientLight(0x445577))

/* ------------------------------------------------
TERRAIN
------------------------------------------------ */

function createTerrain(){

const geo = new THREE.PlaneGeometry(80,80,60,60)

const pos = geo.attributes.position

for(let i=0;i<pos.count;i++){

const y=(Math.random()-0.5)*0.2
pos.setY(i,y)

}

geo.computeVertexNormals()

const mat = new THREE.MeshLambertMaterial({color:0x4e8c3a})

const mesh = new THREE.Mesh(geo,mat)

mesh.rotation.x=-Math.PI/2
mesh.receiveShadow=true

scene.add(mesh)

}

createTerrain()

/* ------------------------------------------------
PROCEDURAL TREES
------------------------------------------------ */

function addTree(x,z){

const trunk = new THREE.Mesh(
new THREE.CylinderGeometry(0.1,0.1,1),
new THREE.MeshLambertMaterial({color:0x7a4d2c})
)

trunk.position.set(x,0.5,z)

const crown = new THREE.Mesh(
new THREE.SphereGeometry(0.6),
new THREE.MeshLambertMaterial({color:0x2f7d32})
)

crown.position.set(x,1.3,z)

scene.add(trunk)
scene.add(crown)

}

for(let i=0;i<35;i++){

addTree(
(Math.random()-0.5)*35,
(Math.random()-0.5)*35
)

}

/* ------------------------------------------------
VILLAGE GENERATION
------------------------------------------------ */

const plots=[]

function generateVillage(count){

for(let i=0;i<count;i++){

let x,z,valid=false

while(!valid){

x=(Math.random()-0.5)*18
z=(Math.random()-0.5)*18

valid=plots.every(p=>Math.hypot(p.x-x,p.z-z)>4)

}

plots.push({x,z,house:null})

const marker = new THREE.Mesh(
new THREE.CircleGeometry(1.2,32),
new THREE.MeshBasicMaterial({color:0x2b4c7e})
)

marker.rotation.x=-Math.PI/2
marker.position.set(x,0.05,z)

scene.add(marker)

}

}

generateVillage(6)

/* ------------------------------------------------
BUILDING SYSTEM
------------------------------------------------ */

function buildHouse(plot,data){

if(plot.house) scene.remove(plot.house)

const g = new THREE.Group()

let y=0

if(data.foundation){

const f = new THREE.Mesh(
new THREE.BoxGeometry(1.2,0.4,1.2),
new THREE.MeshLambertMaterial({color:0x8d6e63})
)

f.position.y=0.2
g.add(f)
y+=0.4

}

if(data.wall){

const w = new THREE.Mesh(
new THREE.BoxGeometry(1.2,1.1,1.2),
new THREE.MeshLambertMaterial({color:0xbdbdbd})
)

w.position.y=y+0.55
g.add(w)
y+=1.1

}

if(data.roof){

const r = new THREE.Mesh(
new THREE.ConeGeometry(1,0.7,4),
new THREE.MeshLambertMaterial({color:0xaa3333})
)

r.position.y=y+0.35
g.add(r)

}

g.position.set(plot.x,0,plot.z)

scene.add(g)
plot.house=g

}

/* ------------------------------------------------
DRAG SYSTEM
------------------------------------------------ */

let dragging=null

document.querySelectorAll(".mat").forEach(el=>{

el.addEventListener("dragstart",()=>{

dragging={
cat:el.dataset.cat,
id:el.dataset.id
}

})

})

/* ------------------------------------------------
RAYCASTING
------------------------------------------------ */

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

renderer.domElement.addEventListener("mouseup",e=>{

if(!dragging) return

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const plane=new THREE.Plane(new THREE.Vector3(0,1,0),0)
const point=new THREE.Vector3()

raycaster.ray.intersectPlane(plane,point)

let best=null
let dist=999

plots.forEach(p=>{

const d=Math.hypot(point.x-p.x,point.z-p.z)

if(d<dist){
dist=d
best=p
}

})

if(best){

if(!best.data)
best.data={}

best.data[dragging.cat]=dragging.id

buildHouse(best,best.data)

}

dragging=null

})

/* ------------------------------------------------
FLOOD SYSTEM
------------------------------------------------ */

let water

function startFlood(){

if(water) scene.remove(water)

const geo = new THREE.PlaneGeometry(80,80)

const mat = new THREE.MeshPhongMaterial({
color:0x1e5ed6,
transparent:true,
opacity:0.55
})

water = new THREE.Mesh(geo,mat)

water.rotation.x=-Math.PI/2
water.position.y=-0.2

scene.add(water)

}

startFlood()

let floodHeight=0
let flooding=true

function updateFlood(){

if(!flooding) return

floodHeight+=0.002

water.position.y=floodHeight

plots.forEach(p=>{

if(!p.house) return

if(p.house.position.y < floodHeight){

p.house.rotation.z += 0.01

}

})

}

/* ------------------------------------------------
CAMERA ORBIT
------------------------------------------------ */

let angle=0

function animate(){

requestAnimationFrame(animate)

angle+=0.002

camera.position.x=Math.sin(angle)*18
camera.position.z=Math.cos(angle)*18
camera.lookAt(0,0,0)

updateFlood()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
```
